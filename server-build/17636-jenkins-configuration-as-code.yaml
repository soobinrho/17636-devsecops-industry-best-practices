# Reference: http://<JENKINS_URL>/manage/configuration-as-code/reference
jenkins:
  systemMessage: "SCM: https://github.com/soobinrho/17636-devsecops-industry-best-practices"
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: ${JENKINS_ADMIN_USER}
          password: ${JENKINS_ADMIN_PASS}
  nodes:
    - permanent:
        nodeName: "17636-jenkins-ssh-agent"
        nodeDescription: "Provisioned by Docker Compose. This is Linux box running an SSH server."
        labelString: "linux ssh-agent"
        numExecutors: 1
        remoteFS: "/home/jenkins/agent"
        mode: NORMAL
        launcher:
          ssh:
            credentialsId: "17636-jenkins-ssh-agent-key"
            host: "17636-jenkins-ssh-agent"
            port: 22
            sshHostKeyVerificationStrategy:
              manuallyTrustedKeyVerificationStrategy:
                requireInitialManualTrust: false

credentials:
  system:
    domainCredentials:
      - credentials:
          - basicSSHUserPrivateKey:
              scope: GLOBAL
              id: "17636-jenkins-ssh-agent-key"
              passphrase: ""
              username: "jenkins"
              description: "SSH private key for the Jenkins agent."
              privateKeySource:
                directEntry:
                  privateKey: ${JENKINS_AGENT_SSH_PRIVATE_KEY}
          - string:
              scope: GLOBAL
              id: "sonarqube-token"
              description: "Token generated by SonarQube."
              secret: ${SONARQUBE_TOKEN}

unclassified:
  location:
    url: ${JENKINS_URL_AND_PORT}
  sonarGlobalConfiguration:
    buildWrapperEnabled: true
    installations:
    - credentialsId: "sonarqube-token"
      name: "sonarqube"
      serverUrl: "http://17636-sonarqube:9000"
      triggers:
        skipScmCause: false
        skipUpstreamCause: false

# Reference: http://localhost:8080/manage/configuration-as-code/viewExport
tool:
  sonarRunnerInstallation:
    installations:
      - name: "sonarqube"
        properties:
          - installSource:
              installers:
                - sonarRunnerInstaller:
                    id: "8.1.0.6389"

jobs:
  - script: |
      pipelineJob('17636-petclinic') {
        description('https://github.com/soobinrho/17636-devsecops-industry-best-practices')
        logRotator {
          numToKeep(10)
        }
        properties {
          ownership {
            primaryOwnerId("${JENKINS_ADMIN_USER}")
          }
          // Reference: https://github.com/jenkinsci/job-dsl-plugin/wiki/Migration#migrating-to-172
          pipelineTriggers {
            triggers {
              cron {
                spec('@hourly')
              }
            }
          }
        }
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('https://github.com/soobinrho/17636-devsecops-industry-best-practices')
                }
                branches('*/main')
                extensions {
                  submoduleOptions {
                    recursive(true)
                  }
                }
              }
            }
            scriptPath('./server-build/Jenkinsfile') 
          }
        }
      }
