global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'prometheus'
    scrape_interval: 5s
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'jenkins'
    scrape_interval: 5s
    metrics_path: '/prometheus/'
    static_configs:
      - targets: ['17636-jenkins:8080']

  - job_name: 'node'
    scrape_interval: 5s
    static_configs:
      - targets: ['17636-prometheus-node-exporter:9100']
