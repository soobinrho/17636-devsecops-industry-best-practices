services:
  17636-jenkins:
    build: .
    ports:
      - "8080:8080"
      - "50000:50000"
    networks:
      - network-jenkins
    volumes:
      - 17636-volume-jenkins:/var/jenkins_home
    # - /var/run/docker.sock:/var/run/docker.sock
    # Required because "permission denied while trying to connect to the docker API."
    # privileged: true
    # user: root
    environment:
      - CASC_JENKINS_CONFIG=/usr/share/jenkins/jenkins.yaml
    env_file:
      - ./.env.jenkins

  17636-jenkins-ssh-agent:
    image: jenkins/ssh-agent:jdk25
    ports:
      - "22:22"
    networks:
      - network-jenkins
    env_file:
      - ./.env.jenkins-ssh-agent
      - ./.env.petclinic

  17636-sonarqube:
    image: sonarqube:26.7.0.124771-community
    ports:
      - "9000:9000"
    networks:
      - network-jenkins
    volumes:
      - 17636-volume-sonarqube-data:/opt/sonarqube/data
      - 17636-volume-sonarqube-extensions:/opt/sonarqube/extensions
      - 17636-volume-sonarqube-logs:/opt/sonarqube/logs
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:9000/api/system/status | grep -q -e '\"status\":\"UP\"'"]
      interval: 2s
      timeout: 5s
      retries: 20
      start_period: 5s

  # 17636-prometheus:
  #   image: prom/prometheus:v3
  #   ports:
  #     - "9001:9000"
  #   networks:
  #     - network-jenkins
  #   depends_on:
  #     17636-jenkins:
  #       condition: service_started
  #
  # 17636-grafana:
  #   image: grafana/grafana:11.6.16
  #   ports:
  #     - "3000:3000"
  #   networks:
  #     - network-jenkins
  #   depends_on:
  #     17636-prometheus:
  #       condition: service_started

networks:
  network-jenkins:

volumes:
  17636-volume-jenkins:
  17636-volume-sonarqube-data:
  17636-volume-sonarqube-extensions:
  17636-volume-sonarqube-logs:
