services:
  17636-jenkins:
    image: jenkins/jenkins:lts
    ports:
      - "8080:8080"
    networks:
      - network-jenkins
    volumes:
      - volume-jenkins:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

  17636-prometheus:
    image: prom/prometheus:v3
    ports:
      - "9000:9000"
    networks:
      - network-jenkins
    depends_on:
      17636-jenkins:
        condition: service_started

  17636-grafana:
    image: grafana/grafana:11.6.16
    ports:
      - "3000:3000"
    networks:
      - network-jenkins
    depends_on:
      17636-prometheus:
        condition: service_started

  17636-sonarqube:
    image: sonarqube:26.7.0.124771-community
    ports:
      - "9090:9090"
    networks:
      - network-jenkins
    depends_on:
      17636-jenkins:
        condition: service_started

  # The pet clinic and the database are only required for the prod server,
  # and are not required to run here, since Jenkins will clone the repo
  # and run the tests and build scripts in the bulid server.

  # Nevertheless, these two are included here because the assignment's
  # requirement specifically calls for it.
  17636-pet-clinic:
    image: soobinrho/17636-pet-clinic:latest
    ports:
      - "80:8080"
    networks:
      - network-pet-clinic
    environment:
      - SPRING_PROFILES_ACTIVE=postgres
      - POSTGRES_PASS=petclinic
      - POSTGRES_USER=petclinic
      - POSTGRES_DB=petclinic
      - POSTGRES_URL=jdbc:postgresql://17636-postgres/petclinic
    depends_on:
      17636-postgres:
        condition: service_healthy

  17636-postgres:
    image: postgres:18.4
    ports:
      - "5432:5432"
    networks:
      - network-pet-clinic
    environment:
      - POSTGRES_PASSWORD=petclinic
      - POSTGRES_USER=petclinic
      - PGUSER=petclinic
      - POSTGRES_DB=petclinic
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-d", "petclinic", "-U", "petclinic"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  network-jenkins:
  network-pet-clinic:

volumes:
  volume-jenkins:
