services:
  17636-pet-clinic:
    image: soobinrho/17636-pet-clinic:latest
    ports:
      - "80:8080"
    networks:
      - network-db

  17636-postgres:
    image: postgres:18.4
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=petclinic
      - POSTGRES_DB=petclinic
    networks:
      - network-db

networks:
  network-db:
  network-prometheus:
